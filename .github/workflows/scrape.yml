name: Job Scraper — Every Hour

on:
  schedule:
    - cron: '0 * * * *'   # runs at the top of every hour
  workflow_dispatch:        # lets you trigger manually from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push README.md updates

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python job_scraper.py

      - name: Commit and push updated files
        run: |
          git config --global user.name "Job Scraper Bot"
          git config --global user.email "bot@github.com"
          git add README.md seen_links.csv *-Jobs-List.md || true
          git diff --staged --quiet || git commit -m "🤖 Job update — $(date +'%Y-%m-%d %H:%M')"
          git push
